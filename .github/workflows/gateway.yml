name: Cloud Android Gateway

on:
  workflow_dispatch:
    inputs:
      admin_user:
        description: "Dashboard admin username"
        required: true
      admin_pass:
        description: "Dashboard admin password"
        required: true
      tunnel:
        description: "Dashboard tunnel: cloudflare | ngrok"
        required: true
        default: "cloudflare"
      ngrok_token:
        description: "Ngrok auth token (if tunnel=ngrok)"
        required: false
        default: ""

concurrency:
  group: cloud-android-gateway
  cancel-in-progress: true

jobs:
  gateway:
    runs-on: macos-15
    timeout-minutes: 350
    env:
      ADMIN_USER: ${{ github.event.inputs.admin_user }}
      ADMIN_PASS: ${{ github.event.inputs.admin_pass }}
      TUNNEL: ${{ github.event.inputs.tunnel }}
      NGROK_TOKEN: ${{ github.event.inputs.ngrok_token }}
      PORT: "8080"
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ws-scrcpy + tunnel
        run: |
          set -x
          brew install scrcpy || true
          npm i -g ws-scrcpy@0.8.5 || npm i -g ws-scrcpy || true
          if [ "$TUNNEL" = "ngrok" ]; then
            brew install ngrok/ngrok/ngrok || brew install ngrok || true
            [ -n "$NGROK_TOKEN" ] && ngrok config add-authtoken "$NGROK_TOKEN" || true
          else
            brew install cloudflared || true
          fi
          node --version; which cloudflared || true; which ngrok || true

      - name: Boot gateway + tunnel (robust)
        run: |
          set -e
          chmod +x .github/scripts/boot-device.sh || true

          # --- start gateway with crash auto-restart ---
          start_gateway() { nohup node server.js > gateway.log 2>&1 & echo $! > gateway.pid; }
          start_gateway
          echo "[gateway] pid=$(cat gateway.pid)"

          # --- wait until the server actually answers on :$PORT (up to 60s) ---
          ok=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:$PORT/" || echo 000)
            # 401 (auth required) means the server is up and healthy
            if [ "$code" = "401" ] || [ "$code" = "200" ]; then ok=1; echo "[gateway] healthy (HTTP $code) after ${i}x2s"; break; fi
            # restart if the process died
            if ! kill -0 "$(cat gateway.pid)" 2>/dev/null; then echo "[gateway] crashed, restarting..."; cat gateway.log; start_gateway; fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then echo "::error::gateway did not become healthy"; cat gateway.log; exit 1; fi

          # --- open the tunnel ---
          if [ "$TUNNEL" = "ngrok" ]; then
            nohup ngrok http $PORT --log=stdout > ngrok.log 2>&1 &
            for i in $(seq 1 20); do
              URL=$(curl -s http://localhost:4040/api/tunnels | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{console.log(JSON.parse(d).tunnels[0].public_url)}catch(e){console.log('')}})")
              [ -n "$URL" ] && break; sleep 2
            done
          else
            nohup cloudflared tunnel --url "http://127.0.0.1:$PORT" --no-autoupdate > cf.log 2>&1 &
            for i in $(seq 1 30); do
              URL=$(grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' cf.log | head -1)
              [ -n "$URL" ] && break; sleep 2
            done
          fi

          if [ -z "$URL" ]; then echo "::error::tunnel URL not found"; cat cf.log ngrok.log 2>/dev/null; exit 1; fi

          # --- verify the tunnel reaches the gateway (expects 401) ---
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/" || echo 000)
            if [ "$code" = "401" ] || [ "$code" = "200" ]; then echo "[tunnel] reachable (HTTP $code)"; break; fi
            sleep 3
          done

          echo "=================================================="
          echo "  ✅ DASHBOARD URL : $URL"
          echo "  👤 ADMIN USER    : $ADMIN_USER"
          echo "  📱 Devices open at: $URL/<devicename>"
          echo "=================================================="
          echo "DASHBOARD_URL=$URL" >> "$GITHUB_ENV"

      - name: Keep alive (with health watchdog)
        run: |
          echo "Dashboard live at: $DASHBOARD_URL"
          for i in $(seq 1 340); do
            sleep 60
            if ! kill -0 "$(cat gateway.pid 2>/dev/null)" 2>/dev/null; then
              echo "[watchdog] gateway died — restarting"; nohup node server.js > gateway.log 2>&1 & echo $! > gateway.pid
            fi
          done
