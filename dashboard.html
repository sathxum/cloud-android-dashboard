<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cloud Android · Control Center</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { mono: ["JetBrains Mono","monospace"], sans: ["Inter","sans-serif"] },
      colors: { brand:{green:"#3ddc84",blue:"#00d4ff",purple:"#8b5cf6",orange:"#ff9500",red:"#ff3b5c"} },
      keyframes: {
        pulseDot:{ "0%,100%":{opacity:1}, "50%":{opacity:.35} },
        slideUp:{ "0%":{opacity:0,transform:"translateY(8px)"},"100%":{opacity:1,transform:"translateY(0)"} },
        shimmer:{ "0%":{backgroundPosition:"-400px 0"},"100%":{backgroundPosition:"400px 0"} },
      },
      animation:{ pulseDot:"pulseDot 1.4s ease-in-out infinite", slideUp:"slideUp .3s ease both", shimmer:"shimmer 1.4s linear infinite" },
    } } };
  </script>
  <style>
    body{background:#06070a;color:#e7e9ee;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
    .aurora{position:fixed;inset:0;z-index:-2;background:
      radial-gradient(60% 50% at 15% 0%,rgba(61,220,132,.10),transparent 60%),
      radial-gradient(50% 50% at 95% 10%,rgba(0,212,255,.10),transparent 60%),
      radial-gradient(60% 60% at 50% 110%,rgba(139,92,246,.10),transparent 60%);}
    .grid-bg{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at 50% 30%,#000,transparent 85%)}
    .glass{background:rgba(17,20,28,.72);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.07)}
    .glass-hover:hover{border-color:rgba(61,220,132,.35);box-shadow:0 8px 40px -12px rgba(61,220,132,.25)}
    .fld{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.1);transition:.15s}
    .fld:focus{outline:none;border-color:#3ddc84;box-shadow:0 0 0 3px rgba(61,220,132,.15)}
    .btn{transition:.15s;font-weight:600}.btn:active{transform:scale(.97)}
    .btn-primary{background:linear-gradient(135deg,#3ddc84,#00d4ff);color:#04120a;font-weight:800}
    .btn-ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
    .btn-ghost:hover{background:rgba(255,255,255,.09)}
    .term{background:#04060a;border:1px solid rgba(61,220,132,.15);font-family:"JetBrains Mono",monospace;line-height:1.55}
    .skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 37%,rgba(255,255,255,.04) 63%);background-size:800px 100%}
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(61,220,132,.3);border-radius:8px}
    .prog{background:linear-gradient(90deg,#3ddc84,#00d4ff);transition:width .5s ease}
    dialog::backdrop{background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
  </style>
</head>
<body class="font-sans min-h-screen">
  <div class="aurora"></div><div class="grid-bg"></div>
  <div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
  <div id="app" class="max-w-6xl mx-auto px-4 py-5"></div>
  <script src="dashboard.js"></script>
</body>
</html>
